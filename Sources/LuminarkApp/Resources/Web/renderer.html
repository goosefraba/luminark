<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' 'unsafe-inline' 'unsafe-eval'; img-src 'self' data: file:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Luminark</title>
    <script src="./purify.min.js"></script>
    <script src="./marked.min.js"></script>
    <script src="./highlight.min.js"></script>
    <style>
      :root {
        color-scheme: light;
        --font-scale: 1;
        --page-glow: rgba(255, 255, 255, 0.18);
        --text: #1e2937;
        --muted: #5c6978;
        --border: rgba(15, 23, 42, 0.08);
        --border-strong: rgba(15, 23, 42, 0.12);
        --quote-bg: rgba(214, 230, 246, 0.42);
        --table-head: rgba(219, 231, 241, 0.82);
        --inline-code-bg: rgba(15, 23, 42, 0.06);
        --code-bg: rgba(242, 246, 250, 0.96);
        --code-border: rgba(15, 23, 42, 0.08);
        --selection: rgba(59, 130, 246, 0.22);
        --accent: #2563eb;
        --heading: #102033;
        --keyword: #a0237d;
        --string: #0e7490;
        --number: #b45309;
        --title: #1d4ed8;
        --meta: #596579;
        --attribute: #9333ea;
        --literal: #047857;
        --comment: #7c8798;
        --built-in: #c2410c;
      }

      html[data-theme="dark"] {
        color-scheme: dark;
        --page-glow: rgba(17, 24, 39, 0.28);
        --text: #e5ebf3;
        --muted: #a8b3c2;
        --border: rgba(203, 213, 225, 0.10);
        --border-strong: rgba(203, 213, 225, 0.14);
        --quote-bg: rgba(18, 31, 49, 0.78);
        --table-head: rgba(17, 24, 39, 0.88);
        --inline-code-bg: rgba(255, 255, 255, 0.10);
        --code-bg: rgba(5, 10, 20, 0.96);
        --code-border: rgba(148, 163, 184, 0.10);
        --selection: rgba(96, 165, 250, 0.28);
        --accent: #a5c8ff;
        --heading: #f5f7fb;
        --keyword: #f472b6;
        --string: #67e8f9;
        --number: #fdba74;
        --title: #93c5fd;
        --meta: #98a6b8;
        --attribute: #c084fc;
        --literal: #34d399;
        --comment: #7b8798;
        --built-in: #fb923c;
      }

      * {
        box-sizing: border-box;
      }

      ::selection {
        background: var(--selection);
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: transparent;
        color: var(--text);
        scroll-behavior: smooth;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(circle at top left, var(--page-glow), transparent 38%),
          linear-gradient(180deg, transparent, transparent);
        pointer-events: none;
        z-index: -1;
      }

      body {
        font-family: "Charter", "Iowan Old Style", "Palatino Linotype", serif;
        -webkit-font-smoothing: antialiased;
        font-size: calc(18px * var(--font-scale));
        line-height: 1.72;
        padding:
          calc(18px * var(--font-scale))
          calc(28px * var(--font-scale))
          calc(30px * var(--font-scale));
      }

      #content {
        width: 100%;
        min-height: calc(100vh - 48px);
      }

      #content > *:first-child {
        margin-top: 0;
      }

      #content > *:last-child {
        margin-bottom: 0;
      }

      h1,
      h2,
      h3,
      h4,
      h5,
      h6 {
        color: var(--heading);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        font-weight: 750;
        letter-spacing: -0.03em;
        line-height: 1.12;
        margin: calc(1.4em * var(--font-scale)) 0 calc(0.45em * var(--font-scale));
        scroll-margin-top: calc(24px * var(--font-scale));
      }

      h1 {
        font-size: clamp(calc(2.4rem * var(--font-scale)), 4vw, calc(3.3rem * var(--font-scale)));
      }

      h2 {
        font-size: clamp(calc(1.75rem * var(--font-scale)), 2vw, calc(2.3rem * var(--font-scale)));
        padding-bottom: 0.24em;
        border-bottom: 1px solid var(--border);
      }

      h3 {
        font-size: calc(1.55rem * var(--font-scale));
      }

      p,
      ul,
      ol,
      blockquote,
      table {
        margin: calc(1.1em * var(--font-scale)) 0;
      }

      ul,
      ol {
        padding-left: calc(1.4em * var(--font-scale));
      }

      li + li {
        margin-top: calc(0.36em * var(--font-scale));
      }

      a {
        color: var(--accent);
        text-decoration-thickness: 0.08em;
        text-underline-offset: 0.15em;
        transition: color 140ms ease, opacity 140ms ease;
      }

      a:hover {
        opacity: 0.9;
      }

      blockquote {
        margin-left: 0;
        padding: 1px 0 1px calc(1.1em * var(--font-scale));
        border-left: 4px solid var(--accent);
        color: var(--muted);
        background: var(--quote-bg);
        border-radius: 0 calc(18px * var(--font-scale)) calc(18px * var(--font-scale)) 0;
      }

      hr {
        border: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--border-strong), transparent);
        margin: calc(2em * var(--font-scale)) 0;
      }

      img {
        max-width: 100%;
        display: block;
        margin: calc(1.2em * var(--font-scale)) auto;
        border-radius: calc(18px * var(--font-scale));
      }

      table {
        width: 100%;
        border-collapse: collapse;
        overflow: hidden;
        border-radius: calc(18px * var(--font-scale));
        border: 1px solid var(--border);
      }

      thead {
        background: var(--table-head);
      }

      th,
      td {
        text-align: left;
        padding:
          calc(0.8em * var(--font-scale))
          calc(0.95em * var(--font-scale));
        border-bottom: 1px solid var(--border);
      }

      tbody tr:last-child td {
        border-bottom: 0;
      }

      code,
      pre {
        font-family: "SF Mono", "JetBrains Mono", "Menlo", monospace;
        font-size: calc(0.93em * var(--font-scale));
      }

      p code,
      li code,
      td code,
      blockquote code {
        padding:
          calc(0.12em * var(--font-scale))
          calc(0.4em * var(--font-scale));
        background: var(--inline-code-bg);
        border-radius: calc(0.45em * var(--font-scale));
      }

      pre {
        overflow: auto;
        padding:
          calc(1.15rem * var(--font-scale))
          calc(1.25rem * var(--font-scale));
        background: var(--code-bg);
        border: 1px solid var(--code-border);
        border-radius: calc(20px * var(--font-scale));
        line-height: 1.6;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
      }

      pre code {
        background: transparent;
        padding: 0;
      }

      pre.ascii-diagram {
        text-align: center;
        overflow-x: auto;
      }

      pre.ascii-diagram code {
        display: inline-block;
        text-align: left;
        line-height: 1.32;
      }

      .hljs {
        color: var(--text);
        background: transparent;
      }

      .hljs-comment,
      .hljs-quote {
        color: var(--comment);
        font-style: italic;
      }

      .hljs-keyword,
      .hljs-selector-tag,
      .hljs-subst {
        color: var(--keyword);
      }

      .hljs-string,
      .hljs-doctag,
      .hljs-regexp {
        color: var(--string);
      }

      .hljs-number,
      .hljs-symbol,
      .hljs-bullet {
        color: var(--number);
      }

      .hljs-title,
      .hljs-section {
        color: var(--title);
      }

      .hljs-meta,
      .hljs-meta .hljs-keyword {
        color: var(--meta);
      }

      .hljs-attr,
      .hljs-attribute,
      .hljs-selector-class,
      .hljs-selector-attr {
        color: var(--attribute);
      }

      .hljs-literal,
      .hljs-template-variable {
        color: var(--literal);
      }

      .hljs-built_in,
      .hljs-type {
        color: var(--built-in);
      }

      .hljs-emphasis {
        font-style: italic;
      }

      .hljs-strong {
        font-weight: 700;
      }

      #scroll-to-top {
        position: fixed;
        right: 26px;
        bottom: 24px;
        width: 46px;
        height: 46px;
        border: 1px solid var(--border-strong);
        border-radius: 999px;
        background: color-mix(in srgb, var(--code-bg) 72%, transparent);
        color: var(--heading);
        backdrop-filter: blur(18px) saturate(1.2);
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.16);
        opacity: 0;
        transform: translateY(12px) scale(0.94);
        pointer-events: none;
        transition:
          opacity 180ms ease,
          transform 220ms cubic-bezier(0.22, 1, 0.36, 1),
          background-color 160ms ease,
          border-color 160ms ease;
      }

      #scroll-to-top::before {
        content: "↑";
        font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 20px;
        font-weight: 700;
        line-height: 1;
      }

      #scroll-to-top:hover {
        background: color-mix(in srgb, var(--code-bg) 82%, transparent);
      }

      #scroll-to-top.is-visible {
        opacity: 1;
        transform: translateY(0) scale(1);
        pointer-events: auto;
      }

      @media (max-width: 720px) {
        body {
          padding:
            calc(14px * var(--font-scale))
            calc(16px * var(--font-scale))
            calc(22px * var(--font-scale));
        }

        #content {
          min-height: calc(100vh - 36px);
        }

        #scroll-to-top {
          right: 16px;
          bottom: 16px;
        }
      }
    </style>
  </head>
  <body>
    <main id="content"></main>
    <button id="scroll-to-top" aria-label="Scroll to top" title="Scroll to top"></button>
    <script>
      marked.setOptions({
        gfm: true,
        breaks: false
      });

      const content = document.getElementById("content");
      const scrollToTopButton = document.getElementById("scroll-to-top");

      function slugifyHeading(text) {
        return text
          .trim()
          .toLowerCase()
          .normalize("NFKD")
          .replace(/[\u0300-\u036f]/g, "")
          .replace(/[^\p{L}\p{N}\- _]/gu, "")
          .replace(/ /g, "-");
      }

      function assignHeadingIds() {
        const headings = content.querySelectorAll("h1, h2, h3, h4, h5, h6");
        const seen = new Map();

        headings.forEach((heading) => {
          if (heading.id) {
            return;
          }

          const baseSlug = slugifyHeading(heading.textContent || "section");
          const currentCount = seen.get(baseSlug) || 0;
          seen.set(baseSlug, currentCount + 1);

          heading.id = currentCount === 0 ? baseSlug : `${baseSlug}-${currentCount}`;
        });
      }

      function scrollToHash(hash) {
        if (!hash) {
          return;
        }

        const decodedHash = decodeURIComponent(hash.replace(/^#/, ""));
        const target = document.getElementById(decodedHash);

        if (!target) {
          return;
        }

        target.scrollIntoView({
          behavior: "smooth",
          block: "start"
        });
      }

      function updateScrollToTopVisibility() {
        const shouldShow = window.scrollY > 260;
        scrollToTopButton.classList.toggle("is-visible", shouldShow);
      }

      document.addEventListener("click", (event) => {
        const anchor = event.target.closest("a[href]");

        if (!anchor) {
          return;
        }

        const href = anchor.getAttribute("href") || "";

        if (!href.startsWith("#")) {
          return;
        }

        event.preventDefault();
        history.replaceState(null, "", href);
        scrollToHash(href);
      });

      window.addEventListener("scroll", updateScrollToTopVisibility, { passive: true });

      scrollToTopButton.addEventListener("click", () => {
        window.scrollTo({
          top: 0,
          behavior: "smooth"
        });
      });

      const BOX_DRAWING_MATCH = /[\u2500-\u257F\u2580-\u259F\u2550-\u256C\u2190-\u2193\u25B2\u25BC\u25B6\u25C0]/g;
      const MIN_BOX_CHARS = 8;
      const BOX_DENSITY_THRESHOLD = 0.04;
      const DIAGRAM_FILL = 0.75;
      const DIAGRAM_MAX_SCALE = 2.2;

      function isAsciiDiagram(text) {
        const boxChars = (text.match(BOX_DRAWING_MATCH) || []).length;
        if (boxChars < MIN_BOX_CHARS) return false;
        const stripped = text.replace(/\s/g, "").length;
        return stripped > 0 && (boxChars / stripped) >= BOX_DENSITY_THRESHOLD;
      }

      function maxLineLength(text) {
        let max = 0;
        for (const line of text.split("\n")) {
          if (line.length > max) max = line.length;
        }
        return max;
      }

      function detectDiagramBlocks() {
        content.querySelectorAll("pre code").forEach((codeEl) => {
          const pre = codeEl.parentElement;
          if (!pre) return;
          const text = codeEl.textContent || "";
          if (!isAsciiDiagram(text)) return;
          pre.classList.add("ascii-diagram");
          pre.dataset.maxChars = maxLineLength(text);
        });
      }

      function scaleDiagramFontSizes() {
        content.querySelectorAll("pre.ascii-diagram").forEach((pre) => {
          const codeEl = pre.querySelector("code");
          if (!codeEl) return;

          codeEl.style.fontSize = "";

          const chars = parseInt(pre.dataset.maxChars, 10);
          if (!chars || chars < 10) return;

          const padL = parseFloat(getComputedStyle(pre).paddingLeft);
          const padR = parseFloat(getComputedStyle(pre).paddingRight);
          const available = pre.clientWidth - padL - padR;

          const baseFontSize = parseFloat(getComputedStyle(codeEl).fontSize);
          const charWidth = baseFontSize * 0.6;
          const naturalWidth = chars * charWidth;
          const scale = (available / naturalWidth) * DIAGRAM_FILL;

          if (scale > 1.05) {
            codeEl.style.fontSize = (baseFontSize * Math.min(scale, DIAGRAM_MAX_SCALE)) + "px";
          }
        });
      }

      let lastRenderedSource = null;

      window.renderMarkdown = function renderMarkdown(source, theme, fontScale) {
        document.documentElement.setAttribute("data-theme", theme);
        document.documentElement.style.setProperty("--font-scale", String(fontScale ?? 1));

        if (source !== lastRenderedSource) {
          lastRenderedSource = source;
          const html = marked.parse(source ?? "");
          const safeHtml = DOMPurify.sanitize(html, {
            USE_PROFILES: { html: true }
          });

          content.innerHTML = safeHtml;
          assignHeadingIds();
          content.querySelectorAll("pre code").forEach((block) => {
            hljs.highlightElement(block);
          });
          detectDiagramBlocks();
        }

        scaleDiagramFontSizes();
        updateScrollToTopVisibility();

        if (window.location.hash) {
          requestAnimationFrame(() => scrollToHash(window.location.hash));
        }
      };
    </script>
  </body>
</html>
